<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor Tugas - Docs Style</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<style>
body {
    background: #e5e7eb;
    font-family: sans-serif;
}

/* Container semua halaman */
#document-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 24px;
}

/* A4 Page */
.page {
    width: 210mm;
    min-height: 297mm;
    background: white;
    padding: 12.7mm;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    box-sizing: border-box;
    position: relative;
}

/* Konten halaman */
.page-content {
    width: 100%;
}

/* Editor */
.ql-container {
    border: none !important;
    height: auto !important;
}

.ql-editor {
    min-height: 200px;
    overflow: hidden;
}
</style>
</head>

<body>

<div id="document-container">

    <!-- HALAMAN PERTAMA -->
    <div class="page">
        <div class="page-content">
            
            <!-- Header -->
            <div style="border-bottom:2px solid black; margin-bottom:20px;">
                <h2 id="doc-title">Judul Tugas</h2>
                <p id="doc-student">Nama: - | Kelas: -</p>
                <p id="doc-date">Waktu: -</p>
            </div>

            <div id="editor-container"></div>

        </div>
    </div>

</div>

<script>
const quill = new Quill('#editor-container', {
    theme: 'snow',
    placeholder: 'Tulis tugas di sini...',
    modules: {
        toolbar: [
            [{ 'header': [1,2,3,false] }],
            ['bold','italic','underline'],
            [{ 'list': 'ordered' }, { 'list': 'bullet' }],
            ['link','image']
        ]
    }
});

/* ==== UPDATE WAKTU ==== */
function updateTime(){
    document.getElementById('doc-date').innerText =
        "Waktu: " + new Date().toLocaleString('id-ID');
}
updateTime();
setInterval(updateTime, 60000);

/* ==== AUTO PAGE BREAK ==== */
function splitPages() {
    const container = document.getElementById('document-container');
    const pages = container.querySelectorAll('.page');
    const lastPage = pages[pages.length - 1];
    const content = lastPage.querySelector('.page-content');

    const maxHeight = 1122; // A4 px

    if (content.scrollHeight > maxHeight) {
        const newPage = document.createElement('div');
        newPage.className = 'page';

        const newContent = document.createElement('div');
        newContent.className = 'page-content';

        newPage.appendChild(newContent);
        container.appendChild(newPage);

        // pindahkan elemen terakhir
        const lastNode = content.lastChild;
        if (lastNode) {
            newContent.prepend(lastNode);
        }
    }
}

/* ==== TRIGGER ==== */
quill.on('text-change', function(){
    setTimeout(splitPages, 50);
});
</script>

</body>
</html>
