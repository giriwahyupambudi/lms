<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#ffffff">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Tugas Pro - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }

        /* Matikan Scroll di dalam Editor */
        .ql-container.ql-snow { height: auto !important; border: none !important; }
        .ql-editor { 
            overflow-y: hidden !important; 
            height: auto !important; 
            min-height: 400px; 
            padding: 0 !important; 
        }

        .ql-toolbar.ql-snow {
            border-top-left-radius: 0.75rem;
            border-top-right-radius: 0.75rem;
            border-color: #e2e8f0;
            background: #f8fafc;
        }

        /* Garis Panduan Batas Halaman */
        .page-guide-bg {
            background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Cline x1='0' y1='100%25' x2='100%25' y2='100%25' stroke='%23ef4444' stroke-width='4' stroke-dasharray='10,10' /%3E%3Ctext x='50%25' y='calc(100%25 - 8px)' fill='%23ef4444' font-size='14' font-weight='bold' font-family='sans-serif' text-anchor='middle'%3E--- BATAS HALAMAN ---%3C/text%3E%3C/svg%3E");
            background-size: 100% 297mm;
            background-repeat: repeat-y;
            background-position: top center;
        }

        .ql-editor img { max-width: 100%; height: auto; display: block; margin: 10px auto; }

        /* PENTING: Jangan ada transition pada height di scale-wrapper */
        #scale-wrapper {
            transition: none !important; 
        }
    </style>
</head>

<body class="bg-slate-50">

    <div class="max-w-4xl mx-auto pb-24 min-h-screen flex flex-col">
        <main class="flex-1 sm:px-4 py-0 sm:py-6 flex flex-col">
            <div id="editor-wrapper" class="bg-white sm:bg-slate-200 rounded-none sm:rounded-xl shadow-none sm:shadow-inner border-0 sm:border border-slate-300 flex flex-col items-center relative overflow-hidden">
                
                <div id="toolbar-container" class="w-full bg-slate-50 border-b border-slate-300 sticky top-0 z-30 flex justify-center py-2 px-2 overflow-x-auto"></div>

                <div class="w-full py-0 sm:py-4 pb-16 sm:pb-8 flex flex-col items-center">
                    <div id="scale-wrapper" class="w-full flex justify-center origin-top">
                        <div id="pdf-export-area" class="bg-white shadow-lg shrink-0 page-guide-bg"
                            style="position: relative; width: 210mm; padding: 12.7mm; box-sizing: border-box; display: flex; flex-direction: column;">

                            <div id="dynamic-kop" style="border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px;">
                                <h2 id="doc-title" style="margin: 0; font-size: 22px; font-weight: bold;">Judul Tugas</h2>
                                <p id="doc-student" style="margin: 6px 0 0 0; font-size: 14px; color: #333;">Nama: - | Kelas: -</p>
                                <p id="doc-date" style="margin: 6px 0 0 0; font-size: 14px; color: #333;">Waktu: -</p>
                            </div>

                            <div id="editor-container"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="action-container" class="fixed bottom-0 w-full max-w-4xl mx-auto p-4 bg-white border-t border-slate-200 z-40 flex justify-end gap-3 left-1/2 transform -translate-x-1/2">
                <button id="preview-btn" class="px-8 py-3 bg-blue-600 text-white rounded-xl font-semibold shadow-md flex items-center gap-2">
                    <i data-lucide="send" class="w-5 h-5"></i> Kirim
                </button>
            </div>
        </main>
    </div>

    <div id="preview-modal" class="fixed inset-0 bg-slate-900/90 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-4xl h-[90vh] flex flex-col overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center">
                <h3 class="font-bold">Pratinjau PDF</h3>
                <button onclick="document.getElementById('preview-modal').classList.add('hidden')" class="p-2 hover:bg-slate-100 rounded-lg"><i data-lucide="x"></i></button>
            </div>
            <div class="flex-1 bg-slate-200 overflow-y-auto p-4 flex justify-center">
                <img id="preview-img" class="shadow-lg bg-white h-fit" src="" alt="Preview" />
            </div>
        </div>
    </div>

    <script>
        const userData = { nama: "Siswa Demo", kelas: "X-1" };
        let quill;

        window.onload = () => {
            lucide.createIcons();
            
            document.getElementById('doc-student').innerText = `Nama: ${userData.nama} | Kelas: ${userData.kelas}`;
            setInterval(() => {
                document.getElementById('doc-date').innerText = `Waktu: ${new Date().toLocaleString('id-ID')}`;
            }, 1000);

            quill = new Quill('#editor-container', {
                theme: 'snow',
                modules: { toolbar: [[{ 'header': [1, 2, false] }], ['bold', 'italic', 'underline'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['image']] }
            });

            const qlToolbar = document.querySelector('.ql-toolbar');
            if (qlToolbar) document.getElementById('toolbar-container').appendChild(qlToolbar);

            initLayoutManager();
            document.getElementById('preview-btn').onclick = generatePreview;
        };

        function initLayoutManager() {
            const area = document.getElementById('pdf-export-area');
            const wrapper = document.getElementById('scale-wrapper');
            
            const adjustLayout = () => {
                if (!area || !wrapper) return;
                
                const a4WidthPx = 793.7; // Lebar standar A4
                const containerWidth = wrapper.offsetWidth;
                
                // 1. Hitung Skala
                let scale = containerWidth / a4WidthPx;
                
                // Mencegah scale berlebihan di desktop agar tidak pecah/loop
                if (scale > 1.1) scale = 1.1; 

                area.style.transform = `scale(${scale})`;
                area.style.transformOrigin = 'top center';
                
                // 2. Update Tinggi Wrapper (Tanpa Transisi CSS untuk cegah loop)
                const newHeight = Math.ceil(area.getBoundingClientRect().height);
                
                // Gunakan threshold lebih besar (5px) untuk cegah getaran perhitungan
                const currentHeight = wrapper.offsetHeight;
                if (Math.abs(newHeight - currentHeight) > 5) {
                    wrapper.style.height = newHeight + "px";
                }
            };

            // Gunakan debouncing agar tidak terlalu sering menghitung
            let resizeTimeout;
            const debouncedAdjust = () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(adjustLayout, 50);
            };

            window.addEventListener('resize', debouncedAdjust);
            quill.on('text-change', debouncedAdjust);
            
            // Observer untuk gambar atau perubahan konten dinamis
            const ro = new ResizeObserver(debouncedAdjust);
            ro.observe(area);

            setTimeout(adjustLayout, 500);
        }

        async function generatePreview() {
            const area = document.getElementById('pdf-export-area');
            const modal = document.getElementById('preview-modal');
            const img = document.getElementById('preview-img');

            // Sembunyikan garis panduan saat difoto
            area.classList.remove('page-guide-bg');
            
            const canvas = await html2canvas(area, {
                scale: 2,
                useCORS: true,
                windowWidth: 800 // Kunci lebar window saat foto agar konsisten
            });

            area.classList.add('page-guide-bg');
            img.src = canvas.toDataURL('image/jpeg', 0.9);
            modal.classList.remove('hidden');
        }
    </script>
</body>
</html>
