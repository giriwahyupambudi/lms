<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor Tugas LMS</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    background:#f1f5f9;
    font-family:sans-serif;
}

/* Editor */
#editor {
    height:300px;
    background:white;
}

/* A4 Preview */
#print-area {
    width:210mm;
    min-height:297mm;
    padding:12.7mm;
    background:white;
    margin:auto;
    display:none;
}

/* Biar gambar rapi */
#print-area img {
    max-width:100%;
}
</style>
</head>

<body class="p-4">

<h1 class="text-xl font-bold mb-4">Editor Tugas</h1>

<!-- EDITOR -->
<div id="editor"></div>

<!-- BUTTON -->
<div class="mt-4 flex gap-2">
    <button onclick="preview()" class="bg-blue-500 text-white px-4 py-2 rounded">Preview</button>
    <button onclick="downloadPDF()" class="bg-green-500 text-white px-4 py-2 rounded">Download PDF</button>
    <button onclick="send()" class="bg-purple-500 text-white px-4 py-2 rounded">Kirim</button>
</div>

<!-- PREVIEW -->
<div id="print-area" class="mt-6 shadow">

    <div id="kop" style="border-bottom:2px solid black; margin-bottom:20px;"></div>

    <div id="content"></div>

</div>

<script>
const GAS_URL = "URL_GAS_KAMU"; // GANTI INI

const quill = new Quill('#editor', {
    theme: 'snow',
    placeholder: 'Tulis tugas di sini...',
    modules: {
        toolbar: [
            [{header:[1,2,3,false]}],
            ['bold','italic','underline'],
            [{list:'ordered'},{list:'bullet'}],
            ['link','image']
        ]
    }
});

/* ===== PREVIEW ===== */
function preview(){

    const html = quill.root.innerHTML;

    document.getElementById("content").innerHTML = html;

    document.getElementById("kop").innerHTML = `
        <h2>Judul Tugas</h2>
        <p>Nama: User</p>
        <p>Waktu: ${new Date().toLocaleString('id-ID')}</p>
    `;

    document.getElementById("print-area").style.display = "block";

    window.scrollTo(0,document.body.scrollHeight);
}

/* ===== GENERATE PDF ===== */
async function generatePDF(){

    const element = document.getElementById("print-area");

    const opt = {
        margin: 0,
        filename: 'tugas.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    const worker = html2pdf().set(opt).from(element);

    const base64 = await worker.outputPdf('datauristring');

    return base64;
}

/* ===== DOWNLOAD ===== */
async function downloadPDF(){
    await generatePDF(); // otomatis download
}

/* ===== KIRIM KE GAS ===== */
async function send(){

    if(quill.getText().trim().length === 0){
        alert("Tugas masih kosong!");
        return;
    }

    alert("Membuat PDF...");

    const base64 = await generatePDF();

    const payload = {
        action: "uploadTugas",
        data: {
            nama: "User",
            file: base64
        }
    };

    try{
        const res = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify(payload)
        });

        const result = await res.json();

        if(result.status === "success"){
            alert("Berhasil dikirim!");
        }else{
            throw new Error(result.message);
        }

    }catch(err){
        alert("Gagal: " + err.message);
    }
}
</script>

</body>
</html>
