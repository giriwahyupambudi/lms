<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#ffffff">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Tugas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .drag-area {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }
        .drag-area.active {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        /* Loader CSS */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50">

    <div class="max-w-2xl mx-auto pb-24 min-h-screen flex flex-col">
        <!-- Header -->
        <header class="px-4 py-4 flex items-center justify-between bg-white border-b border-slate-100 shadow-sm sticky top-0 z-10">
            <button onclick="history.back()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                <i data-lucide="arrow-left" class="w-6 h-6 text-slate-600"></i>
            </button>
            <div class="text-center">
                <h1 id="page-title" class="font-bold text-slate-800 text-lg">Upload Tugas</h1>
                <p id="page-subtitle" class="text-xs text-slate-500 font-medium mt-0.5">Memuat...</p>
            </div>
            <div class="w-10"></div> <!-- Spacer -->
        </header>

        <!-- Main Content -->
        <main class="flex-1 px-4 py-8 flex flex-col">
            
            <div id="upload-container" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 animate-fade-in">
                
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="cloud-upload" class="w-8 h-8"></i>
                    </div>
                    <h2 class="text-xl font-bold text-slate-800">Kirim Tugas Anda</h2>
                    <p class="text-sm text-slate-500 mt-1">Format yang didukung: PDF, Word, Excel, Gambar, ZIP (Maks. <span id="max-size-label">5MB</span>)</p>
                </div>

                <!-- Error Message Box -->
                <div id="error-box" class="hidden mb-6 p-4 bg-red-50 rounded-xl border border-red-100 flex items-start gap-3">
                    <i data-lucide="alert-circle" class="w-5 h-5 text-red-500 shrink-0 mt-0.5"></i>
                    <p id="error-text" class="text-sm font-medium text-red-800"></p>
                </div>

                <!-- Drag & Drop Area -->
                <div id="drag-area" class="drag-area p-8 rounded-xl flex flex-col items-center justify-center text-center cursor-pointer mb-6 hover:bg-slate-50 group">
                    <i data-lucide="file-up" class="w-10 h-10 text-slate-400 group-hover:text-blue-500 mb-3 transition-colors"></i>
                    <p class="text-base font-semibold text-slate-700 mb-1">Pilih File atau Tarik ke Sini</p>
                    <p class="text-xs text-slate-500">Klik untuk menelusuri file dari perangkat</p>
                    <input type="file" id="file-input" class="hidden" accept="*/*">
                </div>

                <!-- File Preview (Hidden by default) -->
                <div id="file-preview" class="hidden mb-6 p-4 bg-slate-50 rounded-xl border border-slate-200 flex items-center justify-between">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center shrink-0">
                            <i data-lucide="file" class="w-5 h-5"></i>
                        </div>
                        <div class="overflow-hidden">
                            <p id="file-name" class="text-sm font-bold text-slate-800 truncate"></p>
                            <p id="file-size" class="text-xs text-slate-500 font-medium"></p>
                        </div>
                    </div>
                    <button id="remove-file-btn" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors shrink-0">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>

                <button id="upload-btn" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <span id="btn-text">Kirim Tugas Sekarang</span>
                    <div id="btn-loader" class="spinner hidden ml-2"></div>
                </button>
            </div>

            <!-- Success Container -->
            <div id="success-container" class="hidden flex-col items-center justify-center p-8 mt-4 text-center animate-fade-in bg-white rounded-2xl shadow-sm border border-slate-100">
                <div class="w-20 h-20 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mb-4 shadow-inner">
                    <i data-lucide="check-circle" class="w-10 h-10"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-800 mb-2">Tugas Terkirim!</h2>
                <p class="text-slate-500 font-medium mb-8">Kerja bagus! Tugas Anda berhasil diunggah dan tercatat di sistem.</p>
                
                <button onclick="window.location.href='dashboard.html'" class="w-full bg-slate-800 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-slate-200 hover:bg-slate-900 active:scale-95 transition-all">
                    Kembali ke Beranda
                </button>
            </div>
            
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx8dBNFIqvVixZ5ORodulJYxqjtMvjr-Qajjez1uD7UIeq-ypSI1xaNjdUtJkq3ovzsbw/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const idMateri = urlParams.get('id');
        const titleParam = urlParams.get('title') || "Tugas";
        
        let selectedFile = null;
        let base64File = null;

        // Validasi Sesi
        const userData = JSON.parse(localStorage.getItem('user') || '{}');
        if (!userData.username) {
            alert("Sesi Anda telah berakhir. Silakan login kembali.");
            window.location.href = "index.html";
        }

        window.onload = () => {
            lucide.createIcons();
            if(!idMateri) {
                showError("ID Tugas tidak ditemukan di URL.");
                document.getElementById('drag-area').classList.add('pointer-events-none', 'opacity-50');
            }
            document.getElementById('page-subtitle').innerText = decodeURIComponent(titleParam);
            setupFileHandlers();
            fetchSettings();
        };

        let maxFileSizeMB = 5;

        async function fetchSettings() {
            try {
                const res = await fetch(`${API_URL}?sheet=settings`);
                const settings = await res.json();
                const uploadSetting = settings.find(s => s.key === "MAX_UPLOAD_SIZE" || s.pengaturan === "MAX_UPLOAD_SIZE");
                if (uploadSetting) {
                    maxFileSizeMB = parseFloat(uploadSetting.value || uploadSetting.nilai || 5);
                    document.getElementById('max-size-label').innerText = maxFileSizeMB + "MB";
                }
            } catch (e) {
                console.error("Gagal mengambil setting ukuran file:", e);
            }
        }

        function setupFileHandlers() {
            const dragArea = document.getElementById('drag-area');
            const fileInput = document.getElementById('file-input');
            const uploadBtn = document.getElementById('upload-btn');
            const removeBtn = document.getElementById('remove-file-btn');

            // Klik area untuk menelusuri file
            dragArea.addEventListener('click', () => fileInput.click());

            // Deteksi file dari input dialog
            fileInput.addEventListener('change', function() {
                handleFile(this.files[0]);
            });

            // Drag & Drop event listeners
            dragArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                dragArea.classList.add('active');
            });

            dragArea.addEventListener('dragleave', () => {
                dragArea.classList.remove('active');
            });

            dragArea.addEventListener('drop', (e) => {
                e.preventDefault();
                dragArea.classList.remove('active');
                handleFile(e.dataTransfer.files[0]);
            });

            // Hapus file terpilih
            removeBtn.addEventListener('click', () => {
                selectedFile = null;
                base64File = null;
                fileInput.value = "";
                
                document.getElementById('drag-area').classList.remove('hidden');
                document.getElementById('file-preview').classList.add('hidden');
                document.getElementById('upload-btn').disabled = true;
                hideError();
            });

            // Tombol Upload
            uploadBtn.addEventListener('click', uploadTugas);
        }

        function handleFile(file) {
            if (!file) return;

            // Batas maksimal file (Dinamis dari setting)
            const MAX_SIZE = maxFileSizeMB * 1024 * 1024;
            if (file.size > MAX_SIZE) {
                showError(`Ukuran file terlalu besar! Maksimal ${maxFileSizeMB}MB.`);
                return;
            }
            
            hideError();
            selectedFile = file;

            // Tampilkan File Preview
            document.getElementById('drag-area').classList.add('hidden');
            const preview = document.getElementById('file-preview');
            preview.classList.remove('hidden');
            preview.classList.add('flex');
            
            document.getElementById('file-name').innerText = file.name;
            document.getElementById('file-size').innerText = formatBytes(file.size);
            
            document.getElementById('upload-btn').disabled = false;

            // Baca file sebagai Base64
            const reader = new FileReader();
            reader.onload = function(e) {
                base64File = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        function showError(msg) {
            const errBox = document.getElementById('error-box');
            document.getElementById('error-text').innerText = msg;
            errBox.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error-box').classList.add('hidden');
        }

        async function uploadTugas() {
            if (!selectedFile || !base64File) {
                showError("Pilih file terlebih dahulu.");
                return;
            }

            const btn = document.getElementById('upload-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            
            btn.disabled = true;
            btnText.innerText = "Mengunggah...";
            btnLoader.classList.remove('hidden');

            const payload = {
                action: 'uploadTugas',
                data: {
                    username: userData.username || userData.nisn || "-",
                    nama: userData.nama || "-",
                    kelas: userData.kelas || userData.tingkat || "-",
                    id_materi: idMateri,
                    judul: decodeURIComponent(titleParam),
                    tipe: urlParams.get('tipe') || "Tugas",
                    filename: userData.nama.split(" ")[0] + "_" + idMateri + "_" + selectedFile.name,
                    base64: base64File
                }
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.status === "success") {
                    // Berhasil
                    document.getElementById('upload-container').classList.add('hidden');
                    const successDiv = document.getElementById('success-container');
                    successDiv.classList.remove('hidden');
                    successDiv.classList.add('flex');
                    lucide.createIcons();
                } else {
                    throw new Error(result.message || "Gagal mengunggah file");
                }
            } catch (error) {
                console.error(error);
                showError(error.message || "Terjadi kesalahan koneksi saat mengunggah. Coba lagi.");
                btn.disabled = false;
                btnText.innerText = "Kirim Tugas Sekarang";
                btnLoader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
