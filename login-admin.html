<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#ffffff">
    <title>Login Admin - Al Ilmi LMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <script src="pwa-handler.js" defer></script>

    <style>
        :root {
            --primary: #0f172a;
            --primary-hover: #1e293b;
            --accent: #2563eb;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-700: #334155;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body,
        html {
            min-height: 100%;
            width: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--slate-50);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        .auth-wrapper {
            position: fixed;
            width: 100%;
            height: 100%;
            background: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 32px 28px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(255, 255, 255, 1);
            border: 1px solid rgba(226, 232, 240, 0.8);
            z-index: 10;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: var(--primary);
            color: white;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 12px;
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.3);
        }

        .title {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--slate-900);
            letter-spacing: -0.025em;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--slate-700);
            margin-top: 4px;
        }

        .admin-badge {
            background: #ef4444;
            color: white;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            vertical-align: middle;
            margin-left: 6px;
        }

        /* Canvas Background takes care of animation now */

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--slate-700);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--slate-400);
            transition: color 0.3s;
        }

        input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            background: var(--slate-50);
            border: 1px solid var(--slate-200);
            border-radius: 12px;
            font-size: 14px;
            color: var(--slate-900);
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        input:focus+i {
            color: var(--accent);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: translateY(0);
        }

        #error-msg {
            font-size: 13px;
            margin-top: 16px;
            min-height: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .footer-text {
            margin-top: 32px;
            font-size: 12px;
            color: var(--slate-700);
            text-align: center;
        }

        /* Loading Spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--slate-500);
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--accent);
        }

        @media (max-width: 480px) {
            .auth-wrapper {
                padding: 16px;
                justify-content: flex-start;
                overflow-y: auto;
            }

            .login-card {
                padding: 24px 20px;
                margin-top: auto;
                margin-bottom: auto;
            }

            .logo-icon {
                width: 48px;
                height: 48px;
                font-size: 20px;
                border-radius: 12px;
                margin-bottom: 8px;
            }

            .title {
                font-size: 1.25rem;
            }

            .footer-text {
                margin-top: 24px;
            }
        }

    </style>
</head>

<body>

    <canvas id="particleCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; background: radial-gradient(circle at center, #f8fafc 0%, #e2e8f0 100%);"></canvas>

    <div class="auth-wrapper">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1 class="title">Al Ilmi LMS <span class="admin-badge">Admin</span></h1>
                <p class="subtitle">Silakan masuk ke panel manajemen</p>
            </div>

            <div id="login-form">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Masukkan username">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" style="padding-right: 40px;">
                        <i class="fas fa-eye" onclick="togglePasswordVisibility('password', this)" style="left: auto; right: 14px; cursor: pointer; pointer-events: auto;"></i>
                    </div>
                </div>

                <button onclick="handleLogin()" id="btn-login">
                    <div class="spinner" id="loader"></div>
                    <span id="btn-text">Masuk Sebagai Admin</span>
                </button>

                <div id="error-msg"></div>
            </div>

            <div id="syncStatus" style="font-size: 0.75rem; color: var(--slate-500); margin-bottom: 16px; display: none; align-items: center; justify-content: center; gap: 6px;">
                <i class="fas fa-sync-alt fa-spin"></i> <span>Memuat data admin...</span>
            </div>

            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Login Siswa</a>
        </div>

        <div class="footer-text">
            <div>&copy; 2026 Al Ilmi LMS System</div>
            <div style="font-size: 10px; margin-top: 4px; opacity: 0.8;">by Giri Wahyu Pambudi, S.Pd</div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx8dBNFIqvVixZ5ORodulJYxqjtMvjr-Qajjez1uD7UIeq-ypSI1xaNjdUtJkq3ovzsbw/exec";
        let allAdmins = [];

        window.onload = async () => {
            // Cek jika sudah login, langsung alihkan
            const session = localStorage.getItem("admin_user");
            if (session) {
                window.location.href = "admin.html";
                return;
            }

            const syncStatus = document.getElementById("syncStatus");
            syncStatus.style.display = "flex";

            try {
                // Ambil data dari sheet khusus admin
                const res = await fetch(API_URL + "?sheet=admin");
                allAdmins = await res.json();
                
                syncStatus.innerHTML = `<i class="fas fa-check-circle" style="color: #10b981;"></i> <span>Koneksi terhubung, sistem siap digunakan.</span>`;
                setTimeout(() => { syncStatus.style.display = "none"; }, 2000);
            } catch (e) {
                console.error("Gagal memuat data admin", e);
                syncStatus.innerHTML = `<i class="fas fa-wifi" style="color: #ef4444;"></i> <span style="color: #ef4444;">Sistem offline.</span>`;
                updateMsg("Sistem offline. Pastikan koneksi internet stabil.", "#e11d48", "wifi");
            }
        };

        async function handleLogin() {
            const usernameInput = document.getElementById("username").value.trim();
            const passwordInput = document.getElementById("password").value.trim();
            const btnText = document.getElementById("btn-text");
            const loader = document.getElementById("loader");
            const errorDiv = document.getElementById("error-msg");
            const btn = document.getElementById("btn-login");

            if (!usernameInput || !passwordInput) {
                updateMsg("Username dan password wajib diisi", "#e11d48", "exclamation-circle");
                return;
            }

            if (allAdmins.length === 0) {
                updateMsg("Data admin sedang dimuat atau kosong.", "#e11d48", "hourglass-half");
                // Coba ambil ulang jika kosong
                try {
                    const res = await fetch(API_URL + "?sheet=admin");
                    allAdmins = await res.json();
                } catch(e) {}
                
                if (allAdmins.length === 0) return;
            }

            loader.style.display = "block";
            btnText.innerText = "Memverifikasi...";
            errorDiv.innerHTML = "";
            btn.disabled = true;

            try {
                // Cek kecocokan kredensial
                const admin = allAdmins.find(u =>
                    (u.username && u.username.toString().trim() === usernameInput) &&
                    (u.password && u.password.toString().trim() === passwordInput)
                );

                if (admin) {
                    updateMsg("Berhasil login! Mengalihkan...", "#059669", "check-circle");
                    localStorage.setItem("admin_user", JSON.stringify(admin));
                    
                    // Catat log login admin (opsional)
                    try {
                        const now = new Date();
                        fetch(API_URL, {
                            method: "POST",
                            body: JSON.stringify({
                                action: "saveLogin",
                                data: {
                                    username: admin.username,
                                    nama: admin.nama || "Admin",
                                    kelas: "ADMIN",
                                    status: "Sukses Login Panel",
                                    waktu: now.toISOString()
                                }
                            }),
                            mode: "no-cors"
                        });
                    } catch(e) {}

                    setTimeout(() => {
                        window.location.href = "admin.html";
                    }, 1000);
                } else {
                    loader.style.display = "none";
                    btnText.innerText = "Masuk Sebagai Admin";
                    btn.disabled = false;
                    updateMsg("Username atau Password salah", "#e11d48", "times-circle");
                }
            } catch (e) {
                loader.style.display = "none";
                btnText.innerText = "Masuk Sebagai Admin";
                btn.disabled = false;
                updateMsg("Terjadi kesalahan sistem", "#e11d48", "exclamation-triangle");
            }
        }

        function updateMsg(text, color, icon) {
            const errorDiv = document.getElementById("error-msg");
            errorDiv.style.color = color;
            errorDiv.innerHTML = `<i class="fas fa-${icon}"></i> ${text}`;
        }

        // Support "Enter" key to login
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });

        function togglePasswordVisibility(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        // Particle Network Background Animation
        document.addEventListener('DOMContentLoaded', function() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let width, height, particles;

            function init() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                particles = [];
                const numParticles = Math.min(100, Math.floor(window.innerWidth / 20));
                for (let i = 0; i < numParticles; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: (Math.random() - 0.5) * 1.5,
                        vy: (Math.random() - 0.5) * 1.5,
                        radius: Math.random() * 2 + 1
                    });
                }
            }

            function animate() {
                requestAnimationFrame(animate);
                ctx.clearRect(0, 0, width, height);
                
                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    
                    if (p.x < 0 || p.x > width) p.vx *= -1;
                    if (p.y < 0 || p.y > height) p.vy *= -1;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(37, 99, 235, 0.6)';
                    ctx.fill();
                    
                    for (let j = i + 1; j < particles.length; j++) {
                        let p2 = particles[j];
                        let dx = p.x - p2.x;
                        let dy = p.y - p2.y;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < 150) {
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.strokeStyle = `rgba(37, 99, 235, ${(1 - dist/150) * 0.5})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            window.addEventListener('resize', init);
            init();
            animate();
        });
    </script>
</body>
</html>
